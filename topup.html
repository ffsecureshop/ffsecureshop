<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Top Up - FF Secure Shop</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
  *{box-sizing:border-box;margin:0;padding:0;font-family:Arial,sans-serif;}
  :root{
    --bg:linear-gradient(to bottom,#1fd4f3,#8a63ff);
    --card:rgba(255,255,255,0.12);
    --card-border:rgba(255,255,255,0.18);
    --text:#fff;
    --soft:#eefcff;
    --btn:#31d3e7;
    --btn-text:#000;
    --danger:#ff2f6d;
  }
  body.dark-theme{
    --bg:linear-gradient(to bottom,#071428,#0f172a,#111827);
    --card:rgba(255,255,255,0.06);
    --card-border:rgba(255,255,255,0.10);
    --text:#f8fafc;
    --soft:#dbeafe;
    --btn:#2dd4bf;
    --btn-text:#001b22;
  }
  body{min-height:100vh;background:var(--bg);color:var(--text);padding:16px;transition:.25s ease;}
  .container{width:100%;max-width:760px;margin:0 auto;}
  .topbar{display:flex;justify-content:space-between;align-items:center;gap:10px;margin-bottom:16px;}
  .back-btn,.theme-btn{border:none;border-radius:14px;padding:12px 14px;font-weight:700;cursor:pointer;background:rgba(255,255,255,0.12);color:#fff;border:1px solid rgba(255,255,255,0.18);}
  .title{text-align:center;font-size:28px;margin-bottom:16px;text-shadow:0 0 12px rgba(255,255,255,0.14);}
  .card{background:var(--card);border:2px solid var(--card-border);border-radius:28px;padding:20px;box-shadow:0 12px 28px rgba(0,0,0,0.16);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);margin-bottom:16px;}
  .packs{display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:12px;}
  .pack-btn{background:linear-gradient(to right,#8b5cf6,#22d3ee);color:#fff;padding:12px;border-radius:16px;font-weight:700;text-align:center;cursor:pointer;}
  .cart-summary{margin-top:14px;}
  .cart-item{display:flex;justify-content:space-between;margin-bottom:8px;}
  .submit-btn{width:100%;padding:14px;border:none;border-radius:16px;background:linear-gradient(to right,#00d9ff,#8b5cf6);color:#fff;font-weight:700;cursor:pointer;margin-top:14px;}
</style>
</head>
<body>
<div class="container">
  <div class="topbar">
    <button class="back-btn" onclick="history.back()"><i class="fa-solid fa-arrow-left"></i> Retour</button>
    <button class="theme-btn" id="themeToggle"><i class="fa-solid fa-circle-half-stroke"></i></button>
  </div>

  <h1 class="title">Top Up</h1>

  <div class="card">
    <h2>Sélectionnez vos packs</h2>
    <div class="packs" id="packList"></div>
  </div>

  <div class="card">
    <h2>Votre panier</h2>
    <div class="cart-summary" id="cartSummary"></div>
    <form id="checkoutForm">
      <div class="form-group">
        <label for="uid">UID</label>
        <input type="text" id="uid" required placeholder="Votre UID">
      </div>
      <div class="form-group">
        <label for="pseudo">Pseudo</label>
        <input type="text" id="pseudo" required placeholder="Votre pseudo">
      </div>
      <div class="form-group">
        <label for="phone">Téléphone</label>
        <input type="tel" id="phone" required placeholder="Ex : 0340000000">
      </div>
      <div class="form-group">
        <label for="method">Moyen de paiement</label>
        <select id="method" required>
          <option value="MVola">MVola</option>
          <option value="Orange Money">Orange Money</option>
        </select>
      </div>
      <button class="submit-btn" type="submit">Commander</button>
    </form>
  </div>
</div>

<script>
const themeToggle = document.getElementById("themeToggle");
function applyTheme(mode){document.body.classList.toggle("dark-theme",mode==="dark");}
const savedTheme = localStorage.getItem("ff_theme_mode")||"light";
applyTheme(savedTheme==="auto"?window.matchMedia("(prefers-color-scheme: dark)").matches:"light");
themeToggle.addEventListener("click",()=>{const isDark=document.body.classList.contains("dark-theme");const next=isDark?"light":"dark";localStorage.setItem("ff_theme_mode",next);applyTheme(next);});

const packs=[
  {name:"110 💎",price:4700},
  {name:"231 💎",price:9300},
  {name:"341 💎",price:13900},
  {name:"462 💎",price:18500}
];

const packList=document.getElementById("packList");
const cartSummary=document.getElementById("cartSummary");
let cart=[];

function renderCart(){
  if(cart.length===0){cartSummary.textContent="Votre panier est vide";return;}
  cartSummary.innerHTML="";
  let total=0;
  cart.forEach((item,i)=>{
    total+=item.price*item.qty;
    const div=document.createElement("div");
    div.className="cart-item";
    div.textContent=`${item.name} x${item.qty} : ${item.price*item.qty} Ar`;
    cartSummary.appendChild(div);
  });
  const totalDiv=document.createElement("div");
  totalDiv.style.fontWeight="700";
  totalDiv.textContent=`Total: ${total.toLocaleString()} Ar`;
  cartSummary.appendChild(totalDiv);
}

packs.forEach((pack)=>{
  const btn=document.createElement("div");
  btn.className="pack-btn";
  btn.textContent=`${pack.name} - ${pack.price.toLocaleString()} Ar`;
  btn.addEventListener("click",()=>{
    const exist=cart.find(p=>p.name===pack.name);
    if(exist){exist.qty+=1;}else{cart.push({...pack,qty:1});}
    renderCart();
  });
  packList.appendChild(btn);
});

document.getElementById("checkoutForm").addEventListener("submit",(e)=>{
  e.preventDefault();
  if(cart.length===0){alert("Veuillez ajouter au moins un pack");return;}
  const orderData={
    uid:document.getElementById("uid").value.trim(),
    pseudo:document.getElementById("pseudo").value.trim(),
    phone:document.getElementById("phone").value.trim(),
    method:document.getElementById("method").value,
    items:cart
  };
  localStorage.setItem("ff_pending_order",JSON.stringify(orderData));
  window.location.href="paiement.html";
});
</script>
</body>
  </html>
