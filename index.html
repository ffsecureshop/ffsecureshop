<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FF & PUBG Shop</title>
  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }
    body{
      font-family: Arial, sans-serif;
      background:
        radial-gradient(circle at top left, rgba(0,255,255,0.12), transparent 28%),
        radial-gradient(circle at top right, rgba(0,102,255,0.14), transparent 30%),
        linear-gradient(180deg,#030814 0%, #04132d 50%, #020914 100%);
      color:#fff;
      min-height:100vh;
    }
    .header{
      display:flex;
      align-items:center;
      gap:16px;
      padding:22px 18px;
      border-bottom:1px solid rgba(255,255,255,0.08);
      background:rgba(0,0,0,0.18);
      backdrop-filter:blur(6px);
    }
    .logo{
      width:58px;
      height:58px;
      border-radius:18px;
      background:linear-gradient(135deg,#1ff6e2,#42a5ff);
      box-shadow:0 0 25px rgba(39,220,255,0.35);
      flex-shrink:0;
    }
    .header h1{
      font-size:21px;
      font-weight:800;
      letter-spacing:0.2px;
    }
    .container{
      max-width:760px;
      margin:0 auto;
      padding:22px 16px 40px;
    }
    .hero{
      min-height:180px;
      border-radius:32px;
      padding:28px 22px;
      margin-bottom:28px;
      background:
        linear-gradient(180deg, rgba(255,255,255,0.04), rgba(255,255,255,0.03)),
        linear-gradient(135deg, rgba(0,255,255,0.07), rgba(0,98,255,0.05));
      border:1px solid rgba(255,255,255,0.08);
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,0.06),
        0 15px 40px rgba(0,0,0,0.28);
      display:flex;
      flex-direction:column;
      justify-content:center;
    }
    .hero h2{
      font-size:30px;
      line-height:1.15;
      font-weight:900;
      margin-bottom:12px;
      text-shadow:0 0 18px rgba(120,220,255,0.18);
    }
    .hero p{
      font-size:16px;
      line-height:1.5;
      color:rgba(255,255,255,0.88);
      max-width:520px;
    }
    .section-title{
      font-size:30px;
      font-weight:900;
      margin:8px 0 22px;
    }
    .games{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:18px;
    }
    .game-card{
      position:relative;
      min-height:320px;
      border-radius:28px;
      overflow:hidden;
      border:1px solid rgba(255,255,255,0.08);
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,0.06),
        0 14px 34px rgba(0,0,0,0.25);
      background-color:#0d1830;
      background-size:cover;
      background-position:center;
      background-repeat:no-repeat;
      display:flex;
      flex-direction:column;
      justify-content:space-between;
      padding:22px 18px;
    }
    .game-card::before{
      content:"";
      position:absolute;
      inset:0;
      background:
        linear-gradient(180deg, rgba(5,10,20,0.22) 0%, rgba(5,10,20,0.18) 34%, rgba(5,10,20,0.64) 100%);
      z-index:1;
    }
    .game-card > *{
      position:relative;
      z-index:2;
    }
    .freefire{
      background-image:url("ff.jpg");
    }
    .pubg{
      background-image:url("pubg.jpg");
    }
    .game-card h3{
      font-size:28px;
      font-weight:900;
      line-height:1.15;
      text-shadow:0 4px 18px rgba(0,0,0,0.5);
    }
    .btn{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      width:66%;
      max-width:190px;
      min-height:52px;
      border:none;
      border-radius:20px;
      background:linear-gradient(90deg,#1ff6e2 0%, #42a5ff 100%);
      color:#05111f;
      font-size:19px;
      font-weight:900;
      text-decoration:none;
      box-shadow:0 10px 28px rgba(38,197,255,0.28);
      transition:transform .15s ease, opacity .15s ease;
    }
    .btn:active{
      transform:scale(0.98);
      opacity:0.96;
    }
    .btn-wrap{
      display:flex;
      justify-content:center;
      padding-top:22px;
    }
    @media (max-width: 680px){
      .hero{
        min-height:165px;
        border-radius:26px;
      }
      .hero h2{
        font-size:26px;
      }
      .section-title{
        font-size:28px;
      }
      .game-card{
        min-height:255px;
      }
      .game-card h3{
        font-size:24px;
      }
      .btn{
        width:72%;
        font-size:18px;
        min-height:50px;
        max-width:170px;
      }
    }
    @media (max-width: 420px){
      .header h1{
        font-size:18px;
      }
      .logo{
        width:52px;
        height:52px;
      }
      .hero h2{
        font-size:24px;
      }
      .hero p{
        font-size:15px;
      }
      .section-title{
        font-size:26px;
      }
      .game-card h3{
        font-size:22px;
      }
      .btn{
        width:70%;
        min-height:48px;
        font-size:17px;
      }
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo"></div>
    <h1>FF & PUBG Shop</h1>
  </div>

  <div class="container">
    <section class="hero">
      <h2>Bienvenue sur FF &amp; PUBG Shop !</h2>
      <p>Choisis votre jeux et découvrez nos offres exclusives.</p>
    </section>

    <h2 class="section-title">Choisir un jeu</h2>

    <section class="games">
      <div class="game-card freefire">
        <h3>Free Fire</h3>
        <div class="btn-wrap">
          <a class="btn" href="#">Voir</a>
        </div>
      </div>

      <div class="game-card pubg">
        <h3>PUBG Mobile</h3>
        <div class="btn-wrap">
          <a class="btn" href="#">Voir</a>
        </div>
      </div>
    </section>
  </div>
</body>
</html>
