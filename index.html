<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FF Secure Shop</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<style>
  body {
    margin:0;
    font-family: Arial, sans-serif;
    background: linear-gradient(to bottom, #00d9ff, #8b5cf6);
    color: white;
    transition: background 0.3s, color 0.3s;
  }
  /* Barre du haut */
  .topbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 16px;
    background: rgba(0,0,0,0.2);
    border-bottom: 2px solid rgba(255,255,255,0.35);
  }
  .menu-icon, .icon-btn {
    width: 36px;
    height: 36px;
    border-radius: 50%;
    background: #000;
    display: flex;
    align-items: center;
    justify-content: center;
    margin-left: 8px;
    cursor: pointer;
  }
  .menu-icon span {
    display: block;
    width: 18px;
    height: 2px;
    background: white;
    margin: 3px 0;
  }
  .topbar-icons {
    display: flex;
    align-items: center;
  }
  .topbar-icons img {
    width: 36px;
    height: 36px;
    border-radius: 50%;
    margin-left: 8px;
    cursor: pointer;
  }

  /* Bienvenue + slogan */
  .hero {
    text-align: center;
    padding: 40px 20px;
  }
  .hero h1 {
    font-size: 32px;
    margin-bottom: 16px;
  }
  .marquee {
    overflow: hidden;
    white-space: nowrap;
    margin-bottom: 24px;
  }
  .marquee p {
    display: inline-block;
    padding-left: 100%;
    animation: scroll 12s linear infinite;
    font-weight: bold;
    text-shadow: 1px 1px 2px #000;
  }
  @keyframes scroll {
    0% { transform: translateX(0%); }
    100% { transform: translateX(-100%); }
  }

  /* Boutons */
  .hero-buttons a {
    display: inline-block;
    margin: 8px;
    padding: 12px 24px;
    font-weight: bold;
    text-decoration: none;
    color: #000;
    background: #00ffff;
    border: 2px solid #00ffff;
    border-radius: 8px;
    box-shadow: 0 0 10px rgba(0,255,255,0.3);
  }

  /* Mode sombre */
  body.dark-mode {
    background: #121212;
    color: #fff;
  }
  body.dark-mode .topbar {
    background: rgba(255,255,255,0.1);
    border-bottom: 2px solid rgba(255,255,255,0.1);
  }
  body.dark-mode .menu-icon, body.dark-mode .icon-btn {
    background: #fff;
  }
  body.dark-mode .hero-buttons a {
    background: #555;
    border: 2px solid #00ffff;
    color: #00ffff;
  }
</style>
</head>
<body>

<!-- Barre du haut -->
<div class="topbar">
  <div class="menu-icon" onclick="alert('Menu à ajouter')">
    <span></span>
    <span></span>
    <span></span>
  </div>
  <div class="topbar-icons">
    <div class="icon-btn" onclick="togglePanel('historique')">🕒</div>
    <div class="icon-btn" onclick="togglePanel('compte')">👤</div>
    <div class="icon-btn" onclick="togglePanel('panier')">🛒</div>
    <div class="icon-btn" onclick="toggleTheme()">◐</div>
    <a href="https://www.facebook.com/ffsecureshop2026" target="_blank">
      <img src="https://upload.wikimedia.org/wikipedia/commons/5/51/Facebook_f_logo_%282019%29.svg" alt="Facebook">
    </a>
    <a href="https://m.me/ffsecureshop2026" target="_blank">
      <img src="https://upload.wikimedia.org/wikipedia/commons/8/83/Messenger_logo.svg" alt="Messenger">
    </a>
  </div>
</div>

<!-- Hero -->
<div class="hero">
  <h1>Bienvenue sur FF Secure Shop 💎</h1>
  <div class="marquee"><p>⚡ Livraison rapide • 💎 Top Up instantané • Abonnements disponibles •</p></div>
  <div class="hero-buttons">
    <a href="/top-up">Top Up</a>
    <a href="/abonnement">Abonnement</a>
  </div>
</div>

<script>
  // Mode sombre toggle
  function toggleTheme() {
    document.body.classList.toggle('dark-mode');
  }

  // Panneaux (historique / compte / panier) à implémenter
  function togglePanel(panel) {
    alert(panel + ' panneau à implémenter');
  }
</script>

</body>
</html>
