<!-- Barre du haut -->
<div class="topbar">
  <!-- Menu -->
  <button class="icon-btn" onclick="alert('Menu clicqué !')">&#9776;</button>

  <!-- Titre / logo -->
  <div class="topbar-title">FF Secure Shop</div>

  <!-- Historique -->
  <button class="icon-btn" onclick="alert('Historique clicqué !')">&#128340;</button>

  <!-- Profil -->
  <button class="icon-btn" onclick="alert('Profil clicqué !')">&#128100;</button>

  <!-- Mode nuit -->
  <button class="icon-btn" onclick="toggleDarkMode()">&#9788;</button>

  <!-- Panier -->
  <div class="cart-badge-wrap">
    <button class="icon-btn" onclick="openCart()">&#128722;</button>
    <div class="cart-badge" id="cartCount">0</div>
  </div>
</div>

<style>
.topbar {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 12px;
  border-radius: 24px;
  background: linear-gradient(135deg, #6d5bff, #19d6f3);
  margin: 10px;
  backdrop-filter: blur(6px);
}

.icon-btn {
  width: 50px;
  height: 50px;
  border-radius: 16px;
  border: 2px solid rgba(255,255,255,0.25);
  background: rgba(255,255,255,0.15);
  color: #000;
  font-size: 22px;
  display: flex;
  justify-content: center;
  align-items: center;
  cursor: pointer;
}

.topbar-title {
  flex: 1;
  font-weight: 700;
  color: white;
  font-size: 18px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.cart-badge-wrap {
  position: relative;
}

.cart-badge {
  position: absolute;
  top: -6px;
  right: -6px;
  min-width: 24px;
  height: 24px;
  padding: 0 6px;
  border-radius: 50%;
  background: #ff2b7a;
  color: white;
  font-weight: bold;
  font-size: 13px;
  display: flex;
  justify-content: center;
  align-items: center;
}
</style>

<script>
// Exemple simple : panier stocké dans localStorage
function getCart() {
  return JSON.parse(localStorage.getItem('cart')) || [];
}

function updateCartCount() {
  const cart = getCart();
  const totalQty = cart.reduce((sum, item) => sum + item.quantity, 0);
  document.getElementById('cartCount').textContent = totalQty;
}

// Initialisation du compteur
updateCartCount();

// Exemple de fonctions clic pour icônes
function toggleDarkMode() {
  document.body.classList.toggle('dark-mode');
  alert('Mode nuit togglé !');
}

function openCart() {
  alert('Panier clicqué !');
}
</script>
