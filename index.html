<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reload Prime</title>
    <style>
        /* --- LOADER EFFET RIDEAU (TÊTE AUX PIEDS) --- */
        #site-loader {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: #020814;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            transition: opacity 0.5s ease;
        }
        .loader-container {
            position: relative;
            width: 120px;
            height: 120px;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .blue-circle {
            position: absolute;
            width: 100px;
            height: 100px;
            border: 4px solid rgba(0, 255, 255, 0.1);
            border-top: 4px solid #00ffff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        .logo-reveal {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            object-fit: cover;
            /* L'animation de dévoilement (clip-path) */
            animation: revealUpDown 2.5s ease-in-out infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        @keyframes revealUpDown {
            0% { clip-path: inset(0 0 100% 0); opacity: 0; } /* Caché en bas */
            40% { clip-path: inset(0 0 0 0); opacity: 1; }   /* Entièrement visible */
            60% { clip-path: inset(0 0 0 0); opacity: 1; }   /* Pause visible */
            100% { clip-path: inset(0 0 100% 0); opacity: 0; } /* Se recache */
        }

        .loader-hidden {
            opacity: 0;
            visibility: hidden;
        }

        /* TON STYLE GÉNÉRAL ICI */
        body { margin: 0; background: #020814; color: white; font-family: sans-serif; }
    </style>
</head>
<body>

    <div id="site-loader">
        <div class="loader-container">
            <div class="blue-circle"></div>
            <img src="logo.jpg" class="logo-reveal" alt="R">
        </div>
    </div>

    <div style="text-align: center; padding-top: 100px;">
        <h1>RELOAD PRIME</h1>
        <p>Le chargement est terminé.</p>
    </div>

    <script>
        // Script pour cacher le loader après le chargement
        window.addEventListener("load", function() {
            setTimeout(function() {
                document.getElementById("site-loader").classList.add("loader-hidden");
            }, 2000); // Temps d'affichage : 2 secondes
        });
    </script>
</body>
</html>
