<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FF & PUBG Shop</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{
      font-family: Arial, sans-serif;
      background:
        radial-gradient(circle at top left, rgba(0,255,255,0.14), transparent 24%),
        radial-gradient(circle at top right, rgba(0,102,255,0.16), transparent 28%),
        linear-gradient(180deg,#020814 0%, #03122b 45%, #020914 100%);
      color:#fff;
      min-height:100vh;
    }
    .header{
      display:flex;
      align-items:center;
      gap:16px;
      padding:22px 18px;
      border-bottom:1px solid rgba(255,255,255,0.07);
      background:rgba(0,0,0,0.16);
      backdrop-filter:blur(6px);
      box-shadow:0 6px 22px rgba(0,0,0,0.15);
    }
    .logo{
      width:58px;
      height:58px;
      border-radius:18px;
      background:linear-gradient(135deg,#24efe1,#53aefe);
      box-shadow:0 0 28px rgba(39,220,255,0.38);
      flex-shrink:0;
    }
    .header h1{
      font-size:21px;
      font-weight:800;
      letter-spacing:0.2px;
    }
    .container{
      max-width:760px;
      margin:0 auto;
      padding:22px 16px 34px;
    }
    .hero{
      min-height:168px;
      border-radius:32px;
      padding:26px 22px;
      margin-bottom:24px;
      background:
        linear-gradient(180deg, rgba(255,255,255,0.045), rgba(255,255,255,0.025)),
        linear-gradient(135deg, rgba(0,255,255,0.07), rgba(0,98,255,0.06));
      border:1px solid rgba(255,255,255,0.08);
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,0.05),
        0 16px 42px rgba(0,0,0,0.28),
        0 0 24px rgba(25,130,255,0.08);
      display:flex;
      flex-direction:column;
      justify-content:center;
    }
    .hero h2{
      font-size:30px;
      line-height:1.12;
      font-weight:900;
      margin-bottom:14px;
      text-shadow:0 0 18px rgba(120,220,255,0.16);
    }
    .hero p{
      font-size:16px;
      line-height:1.5;
      color:rgba(255,255,255,0.90);
      max-width:520px;
    }
    .section-title{
      font-size:31px;
      font-weight:900;
      margin:4px 0 18px;
      text-shadow:0 0 14px rgba(255,255,255,0.04);
    }
    .games{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:18px;
    }
    .game-card{
      position:relative;
      min-height:340px;
      border-radius:30px;
      overflow:hidden;
      border:1px solid rgba(255,255,255,0.10);
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,0.06),
        0 14px 34px rgba(0,0,0,0.24),
        0 0 24px rgba(30,160,255,0.08);
      background-color:#0d1830;
      background-repeat:no-repeat;
      display:flex;
      flex-direction:column;
      justify-content:space-between;
      padding:22px 18px 18px;
    }
    .game-card::before{
      content:"";
      position:absolute;
      inset:0;
      background:
        linear-gradient(180deg, rgba(3,8,20,0.20) 0%, rgba(3,8,20,0.12) 32%, rgba(3,8,20,0.62) 100%);
      z-index:1;
    }
    .game-card > *{
      position:relative;
      z-index:2;
    }
    .freefire{
      background-image:url("ff.jpg");
      background-size:185% auto;
      background-position:center 44%;
    }
    .pubg{
      background-image:url("pubg.jpg");
      background-size:168% auto;
      background-position:center 30%;
    }
    .game-card h3{
      font-size:28px;
      font-weight:900;
      line-height:1.1;
      text-shadow:0 4px 20px rgba(0,0,0,0.65);
    }
    .btn-wrap{
      display:flex;
      justify-content:center;
      padding-top:18px;
    }
    .btn{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      width:68%;
      max-width:190px;
      min-height:56px;
      border:none;
      border-radius:21px;
      background:linear-gradient(90deg,#28eee0 0%, #4aaeff 100%);
      color:#05111f;
      font-size:19px;
      font-weight:900;
      text-decoration:none;
      box-shadow:
        0 10px 26px rgba(38,197,255,0.25),
        inset 0 1px 0 rgba(255,255,255,0.22);
      transition:transform .15s ease, opacity .15s ease;
    }
    .btn:active{
      transform:scale(0.98);
      opacity:0.96;
    }
    @media (max-width: 680px){
      .hero{
        min-height:160px;
        border-radius:28px;
        margin-bottom:22px;
      }
      .hero h2{font-size:26px}
      .hero p{font-size:15px}
      .section-title{font-size:28px;margin-bottom:16px}
      .game-card{
        min-height:300px;
        border-radius:28px;
      }
      .game-card h3{font-size:24px}
      .btn{
        width:70%;
        font-size:18px;
        min-height:52px;
        max-width:172px;
      }
      .freefire{
        background-size:200% auto;
        background-position:center 42%;
      }
      .pubg{
        background-size:182% auto;
        background-position:center 28%;
      }
    }
    @media (max-width: 420px){
      .header h1{font-size:18px}
      .logo{width:52px;height:52px}
      .hero h2{font-size:24px}
      .hero p{font-size:15px}
      .section-title{font-size:26px}
      .game-card h3{font-size:22px}
      .btn{
        width:68%;
        min-height:50px;
        font-size:17px;
      }
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo"></div>
    <h1>FF & PUBG Shop</h1>
  </div>

  <div class="container">
    <section class="hero">
      <h2>Bienvenue sur FF &amp; PUBG Shop&nbsp;!</h2>
      <p>Choisissez votre jeu et découvrez nos offres exclusives.</p>
    </section>

    <h2 class="section-title">Choisir un jeu</h2>

    <section class="games">
      <div class="game-card freefire">
        <h3>Free Fire</h3>
        <div class="btn-wrap">
          <a class="btn" href="#">Voir</a>
        </div>
      </div>

      <div class="game-card pubg">
        <h3>PUBG Mobile</h3>
        <div class="btn-wrap">
          <a class="btn" href="#">Voir</a>
        </div>
      </div>
    </section>
  </div>
</body>
</html>
