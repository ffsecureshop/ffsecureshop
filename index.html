<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FF Secure Shop</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
  /* --- Reset / général --- */
  body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: linear-gradient(to bottom, #63c3ff, #9b78ff);
    color: #000;
    transition: background 0.3s, color 0.3s;
  }
  a { text-decoration: none; color: inherit; }

  /* --- Barre du haut --- */
  .top-bar {
    display: flex;
    justify-content: flex-end;
    align-items: center;
    padding: 10px 15px;
    background: #00bfff33;
    gap: 15px;
  }
  .top-bar i, .top-bar img {
    font-size: 24px;
    cursor: pointer;
  }
  .top-bar img {
    width: 24px;
    height: 24px;
  }

  /* --- Contenu principal --- */
  .container {
    text-align: center;
    padding: 20px;
  }
  .welcome {
    font-size: 24px;
    font-weight: bold;
    margin-bottom: 10px;
  }
  .info-bandeau {
    display: inline-block;
    background: rgba(255,255,255,0.3);
    padding: 5px 10px;
    border-radius: 12px;
    margin-bottom: 20px;
  }

  /* --- Boutons Top Up / Abonnement --- */
  .btn {
    display: inline-block;
    padding: 15px 40px;
    margin: 10px;
    font-size: 18px;
    font-weight: bold;
    color: #000;
    background: #00ffff;
    border: none;
    border-radius: 12px;
    cursor: pointer;
    transition: 0.2s;
  }
  .btn:hover { background: #00d0d0; }

  /* --- Paiement --- */
  .payment {
    margin: 15px 0;
    font-weight: bold;
  }

  /* --- Contactez-nous --- */
  .contact {
    display: flex;
    justify-content: center;
    gap: 20px;
    margin: 20px 0;
  }
  .contact a {
    display: flex;
    align-items: center;
    justify-content: center;
    background: #000;
    color: #fff;
    width: 40px;
    height: 40px;
    border-radius: 50%;
    font-size: 18px;
  }

  /* --- Mode sombre --- */
  body.dark {
    background: linear-gradient(to bottom, #1c1c1c, #333);
    color: #fff;
  }
  body.dark .info-bandeau { background: rgba(255,255,255,0.1); }
  body.dark .btn { color: #fff; background: #444; }
  body.dark .btn:hover { background: #555; }
  body.dark .contact a { background: #fff; color: #000; }

  /* --- Responsive --- */
  @media (max-width: 600px) {
    .welcome { font-size: 20px; }
    .btn { padding: 12px 30px; font-size: 16px; }
    .top-bar { gap: 10px; padding: 8px 10px; }
  }
</style>
</head>
<body>

<!-- Barre du haut -->
<div class="top-bar">
  <i class="fa-solid fa-bars"></i>
  <i class="fa-regular fa-clock"></i>
  <i class="fa-regular fa-user"></i>
  <i class="fa-solid fa-cart-shopping"></i>
  <i class="fa-solid fa-moon" id="toggle-dark"></i>
  <a href="https://www.facebook.com/ffsecureshop2026" target="_blank">
    <img src="https://upload.wikimedia.org/wikipedia/commons/5/51/Facebook_f_logo_%282019%29.svg" alt="FB">
  </a>
  <a href="https://m.me/ffsecureshop2026" target="_blank">
    <img src="https://upload.wikimedia.org/wikipedia/commons/6/6c/Facebook_Messenger_logo_2020.svg" alt="Messenger">
  </a>
</div>

<!-- Contenu principal -->
<div class="container">
  <div class="welcome">Bienvenue sur FF Secure Shop 💎</div>
  <div class="info-bandeau">heure d’ouverture • Top Up instantané • Abonnements disponibles</div>
  
  <div>
    <button class="btn">Top Up</button>
    <button class="btn">Abonnement</button>
  </div>

  <div class="payment">Paiement : Orange Money • Mvola</div>

  <div class="contact">
    <a href="https://www.facebook.com/ffsecureshop2026" target="_blank"><i class="fab fa-facebook-f"></i></a>
    <a href="https://m.me/ffsecureshop2026" target="_blank"><i class="fab fa-facebook-messenger"></i></a>
  </div>
</div>

<script>
  // Mode sombre
  const toggle = document.getElementById('toggle-dark');
  toggle.addEventListener('click', () => {
    document.body.classList.toggle('dark');
    toggle.classList.toggle('fa-sun');
  });
</script>

</body>
</html>
