<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>FF Secure Shop - Accueil</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:Arial,sans-serif;}
html,body{width:100%;overflow-x:hidden;}
:root{
--bg:linear-gradient(to bottom,#1fd4f3,#8a63ff);
--card:rgba(255,255,255,0.12);
--card-border:rgba(255,255,255,0.18);
--panel:#f8fafc;
--panel-text:#111827;
--topbar:linear-gradient(to right,#9465ff,#2bbef3);
--btn:#31d3e7;
--btn-text:#000;
--icon-bg:rgba(255,255,255,0.12);
--icon-border:rgba(255,255,255,0.22);
--text:#fff;
--soft:#eefcff;
--muted:#64748b;}
body.dark-theme{
--bg:linear-gradient(to bottom,#0f172a,#1e293b);
--card:rgba(255,255,255,0.05);
--card-border:rgba(255,255,255,0.08);
--panel:#111827;
--panel-text:#f8fafc;
--topbar:linear-gradient(to right,#374151,#111827);
--btn:#2dd4bf;
--btn-text:#001b22;
--icon-bg:rgba(255,255,255,0.08);
--icon-border:rgba(255,255,255,0.14);
--text:#f8fafc;
--soft:#dbeafe;
--muted:#cbd5e1;}
body{background:var(--bg);color:var(--text);min-height:100vh;padding:12px;transition:.25s ease;}
.container{width:100%;max-width:980px;margin:0 auto;}
.topbar{
width:100%;display:grid;grid-template-columns:auto 1fr auto;align-items:center;gap:8px;padding:8px 12px;border-radius:22px;background:var(--topbar);border:2px solid rgba(255,255,255,0.18);box-shadow:0 10px 24px rgba(0,0,0,0.15);margin-bottom:16px;}
.brand{text-align:center;font-size:18px;font-weight:700;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;min-width:0;}
.left-zone,.right-zone{display:flex;align-items:center;gap:8px;min-width:0;}
.icon-btn{width:42px;height:42px;border:none;border-radius:14px;background:var(--icon-bg);border:2px solid var(--icon-border);color:#000;display:flex;align-items:center;justify-content:center;font-size:20px;cursor:pointer;flex-shrink:0;position:relative;transition:.18s ease;}
.icon-btn:active{transform:scale(.96);}
.cart-badge{position:absolute;top:-7px;right:-7px;min-width:22px;height:22px;border-radius:50%;background:#ff2f6d;color:#fff;font-size:12px;font-weight:700;display:flex;align-items:center;justify-content:center;padding:0 5px;}
.panel{display:none;width:100%;background:var(--panel);color:var(--panel-text);border-radius:22px;padding:16px;margin-bottom:16px;box-shadow:0 10px 24px rgba(0,0,0,0.15);}
.panel.show{display:block;animation:fadeIn .18s ease;}
@keyframes fadeIn{from{opacity:0;transform:translateY(-6px);}to{opacity:1;transform:translateY(0);}}
.panel h2{font-size:24px;margin-bottom:14px;}
.menu-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;}
.menu-link{text-decoration:none;background:linear-gradient(to right,#8b5cf6,#22d3ee);color:#fff;border-radius:14px;padding:13px;text-align:center;font-weight:700;display:block;}
.theme-list{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-top:8px;}
.theme-btn{width:100%;border:none;border-radius:16px;padding:14px 10px;font-weight:700;cursor:pointer;background:#e5e7eb;color:#111;display:flex;align-items:center;justify-content:center;gap:8px;transition:.18s ease;}
.theme-btn.active{background:linear-gradient(to right,#8b5cf6,#22d3ee);color:#fff;}
.theme-icon{width:24px;display:flex;align-items:center;justify-content:center;color:#000;font-size:20px;}
.theme-text{display:inline;}
.account-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-top:8px;}
.account-tab{border:none;border-radius:14px;padding:12px;font-weight:700;cursor:pointer;background:#e5e7eb;color:#111;}
.account-tab.active{background:linear-gradient(to right,#8b5cf6,#22d3ee);color:#fff;}
.account-box{display:none;margin-top:14px;}
.account-box.show{display:block;}
.form-group{margin-bottom:12px;}
.form-group label{display:block;margin-bottom:6px;font-weight:700;}
.form-group input,.form-group select,.form-group textarea{width:100%;padding:12px;border-radius:12px;border:1px solid #cbd5e1;background:#fff;color:#111;font-size:15px;}
body.dark-theme .form-group input,body.dark-theme .form-group select,body.dark-theme .form-group textarea{background:#0f172a;color:#fff;border-color:#334155;}
.submit-btn,.mini-btn{border:none;border-radius:14px;padding:12px 16px;font-weight:700;cursor:pointer;background:linear-gradient(to right,#00d9ff,#8b5cf6);color:#fff;}
.mini-btn.dark{background:#222;color:#fff;}
.small-note,.cart-empty,.history-empty{color:var(--muted);line-height:1.6;}
.cart-list,.history-list{list-style:none;margin-bottom:14px;}
.cart-item,.history-item{border-bottom:1px solid rgba(0,0,0,0.12);padding:12px 0;}
body.dark-theme .cart-item,body.dark-theme .history-item{border-bottom:1px solid rgba(255,255,255,0.12);}
.cart-item-top,.history-item-top{display:flex;justify-content:space-between;gap:10px;align-items:center;margin-bottom:8px;}
.cart-item-name,.history-item-name{font-weight:700;}
.cart-controls{display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
.qty-btn,.remove-btn{border:none;border-radius:10px;cursor:pointer;font-weight:700;}
.qty-btn{width:34px;height:34px;background:#27d7eb;color:#001b22;font-size:20px;}
.remove-btn{background:#ff2f6d;color:#fff;padding:8px 10px;}
.qty-value{min-width:24px;text-align:center;font-weight:700;}
.cart-total{font-size:18px;font-weight:700;margin-bottom:14px;}
.cart-actions{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:18px;}
.hero{width:100%;background:var(--card);border:2px solid var(--card-border);border-radius:34px;padding:30px 18px 28px;box-shadow:0 12px 28px rgba(0,0,0,0.12);}
.hero h1{font-size:32px;line-height:1.25;text-align:center;color:var(--text);margin-bottom:18px;text-shadow:1px 3px 7px rgba(0,0,0,0.16);white-space:nowrap;word-break:break-word;}
.hero-title{font-size:32px;line-height:1.2;text-align:center;color:var(--text);margin-bottom:18px;text-shadow:1px 3px 7px rgba(0,0,0,0.16);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.marquee-wrap{width:100%;overflow:hidden;border-radius:18px;background:rgba(255,255,255,0.10);border:1px solid rgba(255,255,255,0.16);padding:10px 0;margin-bottom:22px;}
.marquee-track{display:flex;width:max-content;animation:marqueeLoop 18s linear infinite;}
.marquee-text{white-space:nowrap;font-size:15px;font-weight:700;color:#fff;padding-right:34px;}
@keyframes marqueeLoop{0%{transform:translateX(0);}100%{transform:translateX(-50%);}}
.subtitle{text-align:center;font-size:18px;line-height:1.8;color:var(--soft);margin-bottom:20px;}
.info{text-align:center;font-size:17px;line-height:1.8;color:var(--text);margin-bottom:24px;}
.btn-group{width:100%;display:flex;flex-direction:column;gap:16px;align-items:center;margin-top:8px;}
.main-btn{width:100%;max-width:420px;display:block;text-decoration:none;text-align:center;background:var(--btn);color:var(--btn-text);font-weight:700;font-size:18px;padding:18px 18px;border-radius:22px;border:2px solid rgba(255,255,255,0.65);box-shadow:0 0 14px rgba(20,231,255,0.25);}
.mini-text{margin-top:26px;text-align:center;font-size:17px;line-height:1.7;color:var(--soft);}
.contact-section{margin-top:34px;}
.contact-title{text-align:center;font-size:18px;font-weight:700;color:var(--text);margin-bottom:16px;}
.social-links{width:100%;display:flex;justify-content:center;align-items:center;gap:16px;flex-wrap:nowrap;}
.social-link{width:60px;height:60px;border-radius:50%;display:flex;align-items:center;justify-content:center;text-decoration:none;background:rgba(255,255,255,0.06);border:2px solid rgba(255,255,255,0.35);box-shadow:0 0 14px rgba(255,255,255,0.10);flex-shrink:0;}
.social-link i{font-size:26px;}
.user-status{margin-top:10px;font-weight:700;color:#16a34a;}
body.dark-theme .user-status{color:#4ade80;}
.toast-wrap{position:fixed;top:18px;right:18px;z-index:9999;display:flex;flex-direction:column;gap:10px;}
.toast{min-width:220px;max-width:280px;background:rgba(15,23,42,0.96);color:#fff;border:1px solid rgba(255,255,255,0.12);border-left:4px solid #2dd4bf;border-radius:14px;padding:12px 14px;box-shadow:0 10px 24px rgba(0,0,0,0.25);font-size:14px;line-height:1.5;animation:toastIn .22s ease;}
@keyframes toastIn{from{opacity:0;transform:translateY(-8px);}to{opacity:1;transform:translateY(0);}}
@media (max-width:700px){
body{padding:10px;}
.topbar{padding:8px 10px;gap:6px;}
.brand{display:block;font-size:15px;}
.icon-btn{width:40px;height:40px;font-size:18px;border-radius:13px;}
.hero{padding:24px 14px 24px;border-radius:28px;}
.hero-title{font-size:20px;}
.subtitle{font-size:16px;}
.info{font-size:15px;}
.main-btn{font-size:16px;padding:17px 14px;}
.menu-grid,.account-grid{grid-template-columns:1fr;}
.theme-list{grid-template-columns:repeat(3,1fr);}
.theme-btn{justify-content:center;padding:12px 8px;}
.theme-text{display:none;}
.social-link{width:54px;height:54px;}
.social-link i{font-size:24px;}
.toast-wrap{top:12px;right:12px;left:12px;}
.toast{min-width:unset;max-width:none;}
}
@media (min-width:701px){
.brand{display:block;}
.theme-btn{justify-content:center;}
.theme-text{display:inline;}
.btn-group{align-items:center;}
.main-btn{max-width:420px;}
}
</style>
</head>
<body>
<div class="container">

<!-- Topbar -->
<div class="topbar">
  <div class="left-zone">
    <button class="icon-btn" id="menuBtn" type="button"><i class="fa-solid fa-bars"></i></button>
  </div>
  <div class="brand">FF Secure Shop</div>
  <div class="right-zone">
    <button class="icon-btn" id="historyBtn"><i class="fa-regular fa-clock"></i></button>
    <button class="icon-btn" id="accountBtn"><i class="fa-regular fa-user"></i></button>
    <button class="icon-btn" id="themeBtn"><i class="fa-solid fa-circle-half-stroke"></i></button>
    <button class="icon-btn" id="notifBtn"><i class="fa-regular fa-bell"></i></button>
    <button class="icon-btn" id="cartBtn"><i class="fa-solid fa-cart-shopping"></i><span class="cart-badge" id="cartCount">0</span></button>
  </div>
</div>

<!-- Panels, Hero, Cart, Account, Theme etc ... -->

</body>
</html>
