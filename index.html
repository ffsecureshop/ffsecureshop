<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Reload Prime</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;800;900&display=swap" rel="stylesheet">
<style>
/* LOADER COMPLET */
#site-loader {
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  background: #01050a; /* Sombre */
  display: flex;
  justify-content: center;
  align-items: center;
  z-index: 9999;
  transition: opacity 0.6s ease, visibility 0.6s;
}
.loader-container {
  position: relative;
  width: 180px;
  height: 180px;
  display: flex;
  justify-content: center;
  align-items: center;
}
.loader-ring {
  position: absolute;
  width: 150px;
  height: 150px;
  border: 4px solid rgba(0, 255, 255, 0.1);
  border-top: 4px solid #00ffff;
  border-radius: 50%;
  animation: spin 1s linear infinite;
}
.logo-reveal {
  width: 110px; /* Grand logo */
  height: 110px;
  border-radius: 50%;
  object-fit: cover;
  animation: revealUpDown 2.5s ease-in-out infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
@keyframes revealUpDown {
  0% { clip-path: inset(0 0 100% 0); opacity: 0; }
  40% { clip-path: inset(0 0 0 0); opacity: 1; }
  60% { clip-path: inset(0 0 0 0); opacity: 1; }
  100% { clip-path: inset(0 0 100% 0); opacity: 0; }
}
.loader-hidden { opacity: 0; visibility: hidden; }

/* STYLE D'ORIGINE */
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{
  font-family:Arial,sans-serif;min-height:100vh;color:#fff;
  background: radial-gradient(circle at top left, rgba(0,255,255,.12), transparent 24%), radial-gradient(circle at top right, rgba(0,102,255,.14), transparent 28%), linear-gradient(180deg,#020814 0%,#03122b 45%,#020914 100%);
}
[hidden]{display:none!important}
.brand-bar{
  min-height:64px;display:flex;align-items:center;gap:10px;padding:10px 16px;
  border-bottom:1px solid rgba(255,255,255,.06);
  background:linear-gradient(90deg, rgba(0,255,255,.07), rgba(0,98,255,.03) 55%, rgba(0,0,0,0));
  position:sticky;top:0;z-index:10;backdrop-filter:blur(6px);
}
.brand-link{display:flex;align-items:center;gap:10px;text-decoration:none;color:inherit;min-width:0}
.brand-logo{width:34px;height:34px;object-fit:cover;border-radius:9px;box-shadow:0 0 12px rgba(39,220,255,.18);background:#0b1220}
.brand-name{font-family:'Orbitron',Arial,sans-serif;font-size:14px;font-weight:800;letter-spacing:.9px;text-transform:uppercase;line-height:1;display:flex;gap:6px;white-space:nowrap}
.reload{color:#fff}.prime{color:#42b8ff;text-shadow:0 0 10px rgba(66,184,255,.28)}
.quick-actions{margin-left:auto;display:flex;align-items:center;gap:8px}
.quick-action-btn,.top-icon-btn{
  position:relative;width:38px;height:38px;border:none;border-radius:13px;
  background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.10);
  color:#eef7ff;display:flex;align-items:center;justify-content:center;cursor:pointer;
  box-shadow:0 8px 18px rgba(0,0,0,.20);text-decoration:none;-webkit-tap-highlight-color:transparent;
}
.quick-badge{
  position:absolute;top:-5px;right:-5px;min-width:17px;height:17px;padding:0 5px;border-radius:999px;
  background:#25a7ff;color:#fff;font-size:10px;font-weight:900;display:none;align-items:center;justify-content:center;
  box-shadow:0 0 0 2px #071427;
}
.quick-badge.show{display:flex}
.container{max-width:760px;margin:0 auto;padding:16px 16px 32px}
.hero{
  border-radius:24px;padding:22px 18px;margin-bottom:20px;
  background:linear-gradient(180deg,rgba(255,255,255,.045),rgba(255,255,255,.025)),linear-gradient(135deg,rgba(0,255,255,.07),rgba(0,98,255,.06));
  border:1px solid rgba(255,255,255,.08);
  box-shadow:inset 0 1px 0 rgba(255,255,255,.05),0 14px 34px rgba(0,0,0,.25);
}
.hero h1{font-size:25px;font-weight:900;margin-bottom:10px}
.hero p{font-size:15px;line-height:1.5;color:rgba(255,255,255,.86)}
.section-title{font-size:24px;font-weight:900;margin:20px 0 14px}
.games-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.game-card{display:block;min-height:260px;border-radius:24px;overflow:hidden;text-decoration:none;color:inherit;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);box-shadow:0 12px 28px rgba(0,0,0,.26);-webkit-tap-highlight-color:transparent}
.game-image{height:170px;background-size:cover;background-position:center;background-color:#06111f}
.game-card.freefire .game-image{background-image:linear-gradient(180deg,rgba(0,0,0,0),rgba(0,0,0,.18)),url("ff-banner.jpg")}
.game-card.pubg .game-image{background-image:linear-gradient(180deg,rgba(0,0,0,0),rgba(0,0,0,.18)),url("pubg-index.jpg")}
.game-content{min-height:90px;display:flex;flex-direction:column;justify-content:center;text-align:center;padding:14px 10px;background:linear-gradient(180deg,rgba(5,10,20,.92),rgba(5,10,20,1))}
.game-content h3{font-size:22px;font-weight:900;margin-bottom:8px}
.game-content p{font-size:12px;font-weight:900;text-transform:uppercase;letter-spacing:1.4px;color:rgba(255,255,255,.65)}
</style>
</head>
<body>
    <div id="site-loader">
        <div class="loader-container">
            <div class="loader-ring"></div>
            <img src="logo.jpg" class="logo-reveal" alt="Logo">
        </div>
    </div>

    <header class="brand-bar">
      <a href="index.html" class="brand-link">
        <img src="logo.jpg" class="brand-logo" alt="R">
        <div class="brand-name"><span class="reload">RELOAD</span><span class="prime">PRIME</span></div>
      </a>
      <div class="quick-actions">
        <a href="paiement.html" class="quick-action-btn">
          <svg viewBox="0 0 24 24"><path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4Z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 0 1-8 0"/></svg>
          <span id="cartBadge" class="quick-badge">0</span>
        </a>
      </div>
    </header>

    <div class="container">
      <section class="hero">
        <h1>Bienvenue sur Reload Prime</h1>
        <p>Rechargez vos jeux préférés instantanément et en toute sécurité. Les meilleurs prix sont ici.</p>
      </section>

      <h2 class="section-title">Nos Jeux</h2>
      <div class="games-grid">
        <a href="freefire.html" class="game-card freefire">
          <div class="game-image"></div>
          <div class="game-content">
            <h3>FREE FIRE</h3>
            <p>Diamants & Packs</p>
          </div>
        </a>
        <a href="pubg.html" class="game-card pubg">
          <div class="game-image"></div>
          <div class="game-content">
            <h3>PUBG</h3>
            <p>UC & Royale Pass</p>
          </div>
        </a>
      </div>
    </div>

    <script>
        window.addEventListener("load", function() {
            const loader = document.getElementById("site-loader");
            setTimeout(() => {
                loader.classList.add("loader-hidden");
            }, 1500);
        });
    </script>
</body>
</html>
