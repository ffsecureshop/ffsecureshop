<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reload Prime</title>
<!-- Firebase SDK -->
<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js';
import { getAuth, signInWithEmailAndPassword, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from 'https://www.gstatic.com/firebasejs/10.12.5/firebase-auth.js';

const firebaseConfig = {
  apiKey: "AIzaSyCSRQypLcCTW6PLPsp2NMa4UI2l_qORClc",
  authDomain: "reload-prime.firebaseapp.com",
  projectId: "reload-prime",
  storageBucket: "reload-prime.firebasestorage.app",
  messagingSenderId: "77910191148",
  appId: "1:77910191148:web:8a287b820d69700a9db589",
  measurementId: "G-XJRWHM2B85"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const googleProvider = new GoogleAuthProvider();

const authStatus = document.getElementById('authStatus');
const authUserBox = document.getElementById('authUserBox');
const authUserName = document.getElementById('authUserName');
const authUserEmail = document.getElementById('authUserEmail');
const authForm = document.getElementById('authForm');
const loginEmail = document.getElementById('loginEmail');
const loginPassword = document.getElementById('loginPassword');
const googleLoginBtn = document.getElementById('googleLoginBtn');
const logoutBtn = document.getElementById('logoutBtn');

function setStatus(message){
  authStatus.textContent = message;
}

onAuthStateChanged(auth, (user) => {
  if(user){
    setStatus('Connecté.');
    authUserBox.hidden = false;
    authUserName.textContent = user.displayName || 'Utilisateur';
    authUserEmail.textContent = user.email || '-';
  } else {
    setStatus('Non connecté.');
    authUserBox.hidden = true;
    authUserName.textContent = '-';
    authUserEmail.textContent = '-';
  }
});

authForm.addEventListener('submit', async (e) => {
  e.preventDefault();
  try{
    setStatus('Connexion en cours...');
    await signInWithEmailAndPassword(auth, loginEmail.value.trim(), loginPassword.value);
    setStatus('Connexion réussie.');
  } catch (error) {
    setStatus('Erreur : ' + error.message);
  }
});

googleLoginBtn.addEventListener('click', async () => {
  try{
    setStatus('Connexion Google en cours...');
    await signInWithPopup(auth, googleProvider);
    setStatus('Connexion Google réussie.');
  } catch(error){
    setStatus('Erreur Google : ' + error.message);
  }
});

logoutBtn.addEventListener('click', async () => {
  try{
    await signOut(auth);
    setStatus('Déconnecté.');
  } catch(error){
    setStatus('Erreur : ' + error.message);
  }
});
</script>
<style>
body{font-family:Arial,sans-serif;background:#121212;color:#fff;margin:0;padding:0;}
.container{max-width:400px;margin:50px auto;padding:20px;background:#1e1e1e;border-radius:12px;}
.auth-form{display:grid;gap:10px;}
.auth-form input{padding:10px;border:none;border-radius:10px;background:#0b1220;color:#fff;}
.auth-primary-btn,.auth-google-btn,.auth-secondary-btn{padding:10px;border:none;border-radius:10px;font-weight:bold;cursor:pointer;margin-top:5px;}
.auth-primary-btn{background:#00e5ff;color:#121212;}
.auth-google-btn{background:#555;color:#fff;}
.auth-secondary-btn{background:#444;color:#fff;}
.auth-user-box{background:#222;padding:10px;border-radius:10px;margin-top:10px;}
.auth-user-line{display:flex;justify-content:space-between;}
</style>
</head>
<body>
<div class="container">
  <h2>Connexion Compte</h2>
  <form id="authForm" class="auth-form">
    <label for="loginEmail">Email</label>
    <input type="email" id="loginEmail" placeholder="Adresse e-mail" required>
    <label for="loginPassword">Mot de passe</label>
    <input type="password" id="loginPassword" placeholder="Mot de passe" required>
    <button type="submit" class="auth-primary-btn">Se connecter</button>
  </form>
  <button type="button" id="googleLoginBtn" class="auth-google-btn">Continuer avec Google</button>
  <p id="authStatus">Non connecté.</p>
  <div class="auth-user-box" id="authUserBox" hidden>
    <div class="auth-user-line"><span>Nom :</span> <strong id="authUserName">-</strong></div>
    <div class="auth-user-line"><span>Email :</span> <strong id="authUserEmail">-</strong></div>
    <button type="button" id="logoutBtn" class="auth-secondary-btn">Se déconnecter</button>
  </div>
</div>
</body>
</html>
