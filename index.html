<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FF Secure Shop - Accueil</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <style>
    *{
      box-sizing:border-box;
      margin:0;
      padding:0;
      font-family:Arial,sans-serif;
    }
    html,body{width:100%;overflow-x:hidden;}
    :root{
      --bg:linear-gradient(to bottom,#1fd4f3,#8a63ff);
      --card:rgba(255,255,255,0.12);
      --card-border:rgba(255,255,255,0.18);
      --panel:#f8fafc;
      --panel-text:#111827;
      --topbar:linear-gradient(to right,#9465ff,#2bbef3);
      --btn:#31d3e7;
      --btn-text:#000;
      --icon-bg:rgba(255,255,255,0.12);
      --icon-border:rgba(255,255,255,0.22);
      --text:#ffffff;
      --soft:#eefcff;
      --muted:#64748b;
      --danger:#ff2f6d;
      --shadow-neon:0 0 16px rgba(20,231,255,0.22),0 0 30px rgba(139,92,246,0.18);
      --bar-gap:78px;
      --backdrop-light:rgba(0,0,0,0.12);
      --floating-bg:rgba(35,46,78,0.88);
      --floating-border:rgba(255,255,255,0.16);
    }
    body.dark-theme{
      --bg:linear-gradient(to bottom,#071428,#0f172a,#111827);
      --card:rgba(255,255,255,0.05);
      --card-border:rgba(255,255,255,0.08);
      --panel:#0b1730;
      --panel-text:#f8fafc;
      --topbar:linear-gradient(to right,#334155,#0f172a);
      --btn:#2dd4bf;
      --btn-text:#001b22;
      --icon-bg:rgba(255,255,255,0.08);
      --icon-border:rgba(255,255,255,0.14);
      --text:#f8fafc;
      --soft:#dbeafe;
      --muted:#cbd5e1;
      --shadow-neon:0 0 18px rgba(34,211,238,0.16),0 0 34px rgba(139,92,246,0.12);
      --backdrop-dark:rgba(0,0,0,0.20);
      --floating-bg:rgba(24,30,45,0.90);
      --floating-border:rgba(255,255,255,0.10);
    }
    body{
      background:var(--bg);
      color:var(--text);
      min-height:100vh;
      padding:12px;
      transition:.25s ease;
    }
    body.modal-open{overflow:hidden;}
    .container{width:100%;max-width:860px;margin:0 auto;padding-top:84px;position:relative;z-index:1;}
    .topbar-wrap{position:fixed;top:10px;left:10px;right:10px;z-index:300;}
    .topbar-shell{width:100%;max-width:860px;margin:0 auto;}
    .topbar{width:100%;display:flex;justify-content:space-between;align-items:center;gap:10px;padding:8px 10px;border-radius:22px;background:var(--topbar);border:2px solid rgba(255,255,255,0.2);box-shadow:0 10px 24px rgba(0,0,0,0.15);position:relative;z-index:301;}
    .left-zone,.right-zone{display:flex;align-items:center;gap:6px;min-width:0;}
    .icon-btn{width:42px;height:42px;border:none;border-radius:14px;background:var(--icon-bg);border:2px solid var(--icon-border);color:#fff;display:flex;align-items:center;justify-content:center;font-size:20px;cursor:pointer;flex-shrink:0;position:relative;transition:.18s ease;box-shadow:0 0 0 rgba(0,0,0,0);}
    .icon-btn:active{transform:scale(.96);}
    .cart-badge,.notif-badge{position:absolute;top:-7px;right:-7px;min-width:22px;height:22px;border-radius:50%;color:#fff;font-size:12px;font-weight:700;display:flex;align-items:center;justify-content:center;padding:0 5px;z-index:2;}
    .cart-badge{background:var(--danger);}
    .notif-badge{background:#111827;display:none;}
    #panelBackdrop{position:fixed;left:0;right:0;top:var(--bar-gap);bottom:0;display:none;background:var(--backdrop-light);backdrop-filter:blur(3px);-webkit-backdrop-filter:blur(3px);z-index:200;}
    body.dark-theme #panelBackdrop{background:var(--backdrop-dark);}
    #panelBackdrop.show{display:block;}
    .fixed-dropdown{display:none;position:fixed;top:calc(var(--bar-gap) + 8px);left:10px;right:10px;z-index:260;}
    .fixed-dropdown.show{display:block;animation:fadeIn .18s ease;}
    .fixed-dropdown-inner{width:100%;max-width:860px;margin:0 auto;background:var(--panel);color:var(--panel-text);border-radius:22px;padding:16px;box-shadow:0 10px 24px rgba(0,0,0,0.18);border:1px solid rgba(255,255,255,0.12);}
    .center-modal{position:fixed;inset:0;display:none;align-items:center;justify-content:center;padding:18px;z-index:250;}
    .center-modal.show{display:flex;animation:fadeIn .18s ease;}
    .modal-card{width:min(100%,540px);max-height:85vh;overflow:auto;background:var(--panel);color:var(--panel-text);border-radius:24px;padding:18px;box-shadow:0 20px 50px rgba(0,0,0,0.32);border:1px solid rgba(255,255,255,0.12);}
    .modal-card.wide{width:min(100%,720px);}
    .panel-head{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:14px;}
    .panel-head h2{font-size:24px;line-height:1.2;}
    .close-btn{width:38px;height:38px;border:none;border-radius:12px;cursor:pointer;font-size:20px;background:rgba(255,255,255,0.16);color:var(--panel-text);border:1px solid rgba(255,255,255,0.15);flex-shrink:0;}
    /* … Tout le reste du CSS reste inchangé … */
  </style>
</head>
<body>
  <!-- topbar, container, hero … inchangé … -->

  <!-- Modal Panier modifié pour ressembler à ton screenshot -->
  <div class="center-modal" id="cartModal">
    <div class="modal-card wide">
      <div class="panel-head">
        <h2>Votre Panier</h2>
        <button class="close-btn" type="button" data-close-modal="cart">&times;</button>
      </div>

      <div id="emptyState">
        <p class="cart-empty">Le panier est vide pour le moment.</p>
        <div class="goto-title">Aller vers :</div>
        <div class="menu-grid">
          <a class="menu-link" href="topup.html">Top Up</a>
          <a class="menu-link" href="abonnement.html">Abonnement</a>
        </div>
      </div>

      <div id="filledState" style="display:none;">
        <ul class="cart-list" id="cartList"></ul>

        <div class="cart-actions">
          <button class="mini-btn dark" id="clearCart" type="button">Vider le panier</button>
        </div>

        <form id="orderForm">
          <div class="form-group">
            <label for="uid">Player ID *</label>
            <input type="text" id="uid" placeholder="Votre Player ID" required />
          </div>

          <div class="form-group">
            <label for="pseudo">Pseudo</label>
            <input type="text" id="pseudo" placeholder="Votre pseudo exact" required />
          </div>

          <div class="form-group">
            <label for="telephone">Votre Téléphone (03x...)</label>
            <input type="tel" id="telephone" placeholder="0320000000" required />
          </div>

          <div class="form-group">
            <label>Mode de Paiement</label>
            <div class="payment-options">
              <button type="button" class="payment-btn" data-method="mvola">MVOLA</button>
              <button type="button" class="payment-btn" data-method="orange">ORANGE</button>
            </div>
          </div>

          <button type="submit" class="submit-btn full">Confirmer la commande</button>
        </form>
      </div>
    </div>
  </div>

  <!-- Le reste des modals, floating cart, JS … inchangé … -->
  <script>
    // Script du panier modifié pour activer le choix Mvola / Orange en style bouton
    const paymentBtns = document.querySelectorAll(".payment-btn");
    let selectedPayment = null;
    paymentBtns.forEach(btn => {
      btn.addEventListener("click", () => {
        paymentBtns.forEach(b => b.style.border = "");
        btn.style.border = "2px solid #0f0"; // couleur sélection
        selectedPayment = btn.dataset.method;
      });
    });

    document.getElementById("orderForm").addEventListener("submit", (e) => {
      e.preventDefault();
      const cart = JSON.parse(localStorage.getItem("ff_cart") || "[]");
      if (cart.length === 0) { alert("Votre panier est vide."); return; }

      const uid = document.getElementById("uid").value.trim();
      const pseudo = document.getElementById("pseudo").value.trim();
      const phone = document.getElementById("telephone").value.trim();

      if (!uid || !pseudo || !phone || !selectedPayment) {
        alert("Veuillez remplir tous les champs et choisir un mode de paiement.");
        return;
      }

      localStorage.setItem("ff_pending_order", JSON.stringify({
        uid, pseudo, phone, method: selectedPayment, items: cart,
        total: cart.reduce((sum, item) => sum + (item.price * (item.qty||1)),0)
      }));

      window.location.href = "paiement.html";
    });
  </script>
</body>
             </html>
