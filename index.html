<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FF Secure Shop</title>
<style>
  body { margin:0; font-family:sans-serif; background: linear-gradient(to bottom,#4ac7f5,#8b6cf9); transition: background 0.3s, color 0.3s;}
  body.dark { background: #1a1a1a; color: #fff;}
  .top-bar { display:flex; justify-content:space-between; align-items:center; padding:10px; background: linear-gradient(to right,#8b6cf9,#4ac7f5); border-radius:0 0 15px 15px;}
  .icon-btn { background:none; border:none; font-size:24px; cursor:pointer; margin:0 5px;}
  .icon-btn:hover { opacity:0.7;}
  .panel { display:none; position:absolute; top:60px; right:10px; background:#fff; color:#000; border-radius:10px; padding:10px; box-shadow:0 2px 6px rgba(0,0,0,0.3); z-index:100;}
  .panel.show { display:block;}
  body.dark .panel { background:#333; color:#fff;}
  .content { text-align:center; padding:20px;}
  .buttons { display:flex; justify-content:center; margin:15px 0; gap:15px;}
  .buttons button { padding:15px 30px; font-size:18px; border:none; border-radius:10px; background:#4ef0f0; cursor:pointer;}
  body.dark .buttons button { background:#3a3a3a; color:#fff;}
  .contact { margin-top:20px; display:flex; justify-content:center; gap:15px;}
  .contact a { display:flex; align-items:center; justify-content:center; width:50px; height:50px; border-radius:50%; background:#1877f2; color:#fff; font-size:24px; text-decoration:none;}
  .contact a.messenger { background:#00aaff;}
</style>
</head>
<body>

<!-- Barre du haut -->
<div class="top-bar">
  <button class="icon-btn" id="menuBtn">&#9776;</button>
  <div>
    <button class="icon-btn" id="historyBtn">&#128339;</button>
    <button class="icon-btn" id="accountBtn">&#128100;</button>
    <button class="icon-btn" id="themeBtn">&#9788;</button>
    <button class="icon-btn" id="cartBtn">&#128722;<span id="cartCount">0</span></button>
  </div>
</div>

<!-- Panneaux -->
<div class="panel" id="menuPanel">Menu ici</div>
<div class="panel" id="historyPanel">Historique ici</div>
<div class="panel" id="accountPanel">Profil ici</div>
<div class="panel" id="themePanel">
  <div><button id="lightTheme">&#9728; Clair</button></div>
  <div><button id="darkTheme">&#9790; Sombre</button></div>
  <div><button id="autoTheme">&#128263; Auto</button></div>
</div>
<div class="panel" id="cartPanel">Panier vide</div>

<!-- Contenu principal -->
<div class="content">
  <h1>Bienvenue sur FF Secure Shop &#128142;</h1>
  <div style="background:rgba(255,255,255,0.3); border-radius:10px; padding:10px; display:inline-block;">
    pendant les heures d'ouverture &#128293;
  </div>
  <p>Rechargez vos diamants rapidement et en toute sécurité.</p>
  <p>⚡ Livraison rapide • 💎 Top Up instantané • 🔥 Abonnements disponibles</p>

  <div class="buttons">
    <button onclick="window.location.href='topup.html'">Top Up</button>
    <button onclick="window.location.href='abonnement.html'">Abonnement</button>
  </div>

  <p>Paiement : Orange Money • Mvola</p>

  <div class="contact">
    <a href="https://www.facebook.com/ffsecureshop2026" target="_blank">&#xf09a;</a>
    <a href="https://www.messenger.com/t/ffsecureshop2026" target="_blank" class="messenger">&#xf39f;</a>
  </div>
</div>

<script>
const PANELS = {
  menu: document.getElementById("menuPanel"),
  history: document.getElementById("historyPanel"),
  account: document.getElementById("accountPanel"),
  theme: document.getElementById("themePanel"),
  cart: document.getElementById("cartPanel")
};

function closePanels() { Object.values(PANELS).forEach(p=>p.classList.remove("show")); }
function togglePanel(name) {
  const panel = PANELS[name];
  const open = panel.classList.contains("show");
  closePanels();
  if (!open) panel.classList.add("show");
}

document.getElementById("menuBtn").addEventListener("click", e=>{e.stopPropagation(); togglePanel("menu");});
document.getElementById("historyBtn").addEventListener("click", e=>{e.stopPropagation(); togglePanel("history");});
document.getElementById("accountBtn").addEventListener("click", e=>{e.stopPropagation(); togglePanel("account");});
document.getElementById("themeBtn").addEventListener("click", e=>{e.stopPropagation(); togglePanel("theme");});
document.getElementById("cartBtn").addEventListener("click", e=>{e.stopPropagation(); togglePanel("cart");});

document.addEventListener("click", e=>{if(!e.target.closest(".panel")&&!e.target.closest(".icon-btn")) closePanels();});

// Thèmes
document.getElementById("lightTheme").addEventListener("click",()=>{document.body.classList.remove("dark");});
document.getElementById("darkTheme").addEventListener("click",()=>{document.body.classList.add("dark");});
document.getElementById("autoTheme").addEventListener("click",()=>{document.body.classList.remove("dark");});
</script>

<!-- Font Awesome pour icônes Facebook/Messenger -->
<script src="https://kit.fontawesome.com/a076d05399.js" crossorigin="anonymous"></script>

</body>
</html>
