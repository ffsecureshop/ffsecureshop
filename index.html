<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FF Secure Shop</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(to bottom, #00d9ff, #8b5cf6);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .home-box {
      width: 100%;
      max-width: 760px;
      background: rgba(255, 255, 255, 0.12);
      border: 2px solid rgba(255, 255, 255, 0.35);
      border-radius: 24px;
      padding: 30px 20px;
      text-align: center;
      color: white;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.18);
      backdrop-filter: blur(4px);
    }

    .home-box h1 {
      font-size: 38px;
      margin-bottom: 12px;
      text-shadow: 2px 2px 8px rgba(0,0,0,0.35);
    }

    .subtitle {
      font-size: 18px;
      line-height: 1.6;
      margin-bottom: 18px;
      color: #f8faff;
      text-shadow: 1px 1px 4px rgba(0,0,0,0.25);
    }

    .info {
      margin-bottom: 24px;
      font-size: 16px;
      line-height: 1.7;
      color: #ffffff;
    }

    .btn-group {
      display: flex;
      flex-wrap: wrap;
      gap: 14px;
      justify-content: center;
      margin-top: 10px;
    }

    .btn {
      text-decoration: none;
      background: #14e7ff;
      color: #001b22;
      font-weight: bold;
      padding: 14px 26px;
      border-radius: 14px;
      min-width: 170px;
      border: 2px solid rgba(255,255,255,0.9);
      box-shadow: 0 0 14px rgba(20, 231, 255, 0.45);
      transition: 0.2s ease;
    }

    .btn:hover {
      transform: translateY(-2px);
      background: #4ef0ff;
    }

    .mini-text {
      margin-top: 22px;
      font-size: 14px;
      color: #eefcff;
      opacity: 0.95;
    }

    @media (max-width: 600px) {
      .home-box h1 {
        font-size: 28px;
      }

      .subtitle {
        font-size: 16px;
      }

      .btn {
        width: 100%;
        max-width: 260px;
      }
    }
  </style>
</head>
<body>
  <div class="home-box">
    <h1>Bienvenue sur FF Secure Shop 💎</h1>

    <p class="subtitle">
      Rechargez vos diamants rapidement et en toute sécurité.
    </p>

    <div class="info">
      ⚡ Livraison rapide • 💎 Top Up instantané • 🔥 Abonnements disponibles
    </div>

    <div class="btn-group">
      <a href="topup.html" class="btn">Top Up</a>
      <a href="abonnement.html" class="btn">Abonnement</a>
    </div>

    <p class="mini-text">
      Paiement : Orange Money • Mvola
    </p>
  </div>
</body>
  </html>
