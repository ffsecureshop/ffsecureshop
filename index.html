<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>FF Secure Shop - Accueil</title>
<style>
  body {
    margin:0;
    font-family:Arial,sans-serif;
    background: linear-gradient(180deg, #20d8f3 0%, #7d5dff 100%);
    color:#fff;
    padding:16px;
    min-height:100vh;
  }
  .page{
    max-width:480px;
    margin:0 auto;
  }
  .main-card{
    background: rgba(255,255,255,0.12);
    border-radius:36px;
    padding:28px 18px 30px;
    text-align:center;
    backdrop-filter: blur(10px);
  }
  .main-title{
    font-size:31px;
    font-weight:800;
    margin-bottom:18px;
  }
  .notice-box{
    margin-bottom:22px;
    padding:14px 16px;
    border-radius:999px;
    background: rgba(255,255,255,0.09);
    font-size:16px;
    font-weight:700;
    white-space:nowrap;
    overflow:hidden;
  }
  .notice-text{
    display:inline-block;
    padding-left:100%;
    animation:scrollText 16s linear infinite;
  }
  @keyframes scrollText{
    0%{transform:translateX(0);}
    100%{transform:translateX(-100%);}
  }
  .desc{
    margin-bottom:18px;
    font-size:17px;
    line-height:1.7;
  }
  .benefits{
    margin-bottom:26px;
    font-size:17px;
    font-weight:700;
  }
  .main-btn{
    display:block;
    width:100%;
    max-width:320px;
    margin:0 auto 16px;
    padding:19px 18px;
    border-radius:24px;
    text-decoration:none;
    background:#39cfe2;
    color:#000;
    font-size:21px;
    font-weight:800;
  }
  .pay-text{
    margin-top:10px;
    font-size:17px;
    font-weight:700;
  }
  .contact-title{
    margin:38px 0 18px;
    font-size:28px;
    font-weight:800;
  }
  .socials{
    display:flex;
    justify-content:center;
    gap:20px;
  }
  .social-btn{
    width:72px;
    height:72px;
    border-radius:50%;
    border:2px solid rgba(255,255,255,0.40);
    background:rgba(255,255,255,0.10);
    display:flex;
    align-items:center;
    justify-content:center;
    text-decoration:none;
  }
  .social-btn svg{
    width:32px;
    height:32px;
    display:block;
  }
</style>
</head>
<body>
<div class="page">
  <div class="main-card">
    <h1 class="main-title">Bienvenue sur FF Secure Shop 💎</h1>

    <div class="notice-box">
      <div class="notice-text">🔥 Tous les packs sont livrés pendant les heures d'ouvertures 🔥</div>
    </div>

    <p class="desc">
      Rechargez vos diamants rapidement et<br>
      en toute sécurité.
    </p>

    <div class="benefits">
      ⚡ Livraison rapide<br>
      💎 Top Up instantané<br>
      🔥 Abonnements disponibles
    </div>

    <a href="topup.html" class="main-btn">Top Up</a>
    <a href="abonnement.html" class="main-btn">Abonnement</a>

    <div class="pay-text">Paiement : Orange Money • Mvola</div>

    <div class="contact-title">Contactez-nous</div>

    <div class="socials">
      <a href="https://www.facebook.com/ffsecureshop2026" target="_blank" class="social-btn" aria-label="Facebook">
        <svg viewBox="0 0 24 24">
          <path fill="#1877F2" d="M24 12.073C24 5.404 18.627 0 12 0S0 5.404 0 12.073c0 6.019 4.388 11.007 10.125 11.927v-8.437H7.078v-3.49h3.047V9.413c0-3.03 1.792-4.705 4.533-4.705 1.313 0 2.686.236 2.686.236v2.974H15.83c-1.49 0-1.955.931-1.955 1.887v2.268h3.328l-.532 3.49h-2.796V24C19.612 23.08 24 18.092 24 12.073z"/>
        </svg>
      </a>

      <a href="https://m.me/ffsecureshop2026" target="_blank" class="social-btn" aria-label="Messenger">
        <svg viewBox="0 0 24 24">
          <path fill="#00B2FF" d="M12 2C6.477 2 2 6.145 2 11.259c0 2.912 1.451 5.508 3.718 7.205V22l3.209-1.76c.97.27 2.005.419 3.073.419 5.523 0 10-4.145 10-9.259C22 6.145 17.523 2 12 2zm1.017 12.445-2.544-2.714-4.965 2.714 5.461-5.8 2.558 2.714 4.951-2.714-5.461 5.8z"/>
        </svg>
      </a>
    </div>
  </div>
</div>
</body>
  </html>
