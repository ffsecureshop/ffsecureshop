<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FF Secure Shop</title>
<style>
  body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #6dd5fa, #2980b9);
    color: #fff;
  }
  .header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 10px;
    background: rgba(255,255,255,0.1);
    border-radius: 15px;
    margin: 10px;
  }
  .icon {
    width: 40px;
    height: 40px;
    background: #fff;
    color: #000;
    border-radius: 10px;
    display: flex;
    justify-content: center;
    align-items: center;
    margin-left: 5px;
    cursor: pointer;
    font-size: 18px;
  }
  .cart {
    position: relative;
  }
  .cart span {
    position: absolute;
    top: -5px;
    right: -5px;
    background: red;
    color: #fff;
    font-size: 12px;
    padding: 2px 5px;
    border-radius: 50%;
  }
  .container {
    text-align: center;
    margin: 30px 10px;
    padding: 20px;
    background: rgba(255,255,255,0.1);
    border-radius: 15px;
  }
  .button {
    display: block;
    margin: 10px auto;
    padding: 15px;
    width: 80%;
    max-width: 300px;
    background: #66fcf1;
    color: #000;
    font-weight: bold;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    text-decoration: none;
  }
  .button:hover {
    background: #45a29e;
  }
</style>
</head>
<body>

<div class="header">
  <div class="icon" onclick="alert('Menu clicqué !')">&#9776;</div>
  <div class="icon" onclick="alert('Historique clicqué !')">&#128340;</div>
  <div class="icon" onclick="alert('Profil clicqué !')">&#128100;</div>
  <div class="icon" onclick="alert('Mode nuit clicqué !')">&#9788;</div>
  <div class="icon cart" onclick="alert('Panier clicqué !')">
    &#128722;<span>0</span>
  </div>
</div>

<div class="container">
  <h1>Bienvenue sur FF Secure Shop 💎</h1>
  <p>Rechargez vos diamants rapidement et en toute sécurité.</p>
  <p>⚡ Livraison rapide • 💎 Top Up instantané • 🔥 Abonnements disponibles</p>
  
  <a href="topup.html" class="button">Top Up</a>
  <a href="abonnement.html" class="button">Abonnement</a>
  
  <p>Paiement : Orange Money • Mvola</p>
</div>

</body>
</html>
